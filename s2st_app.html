<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speech Translator</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #1a1a2e;
    color: #eee;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    font-size: 26px;
    margin-bottom: 4px;
    color: #fff;
  }

  p.subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 30px;
  }

  .box {
    background: #16213e;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 20px;
    width: 100%;
    max-width: 600px;
    margin-bottom: 16px;
  }

  .box h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888;
    margin: 0 0 14px 0;
  }

  .lang-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .lang-row select {
    flex: 1;
    background: #0f3460;
    color: #eee;
    border: 1px solid #444;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
  }

  .lang-row button {
    background: #0f3460;
    border: 1px solid #444;
    color: #eee;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 18px;
    cursor: pointer;
  }

  .lang-row button:hover {
    background: #1a4a7a;
  }

  .mic-area {
    text-align: center;
    padding: 10px 0;
  }

  #micBtn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #e74c3c;
    border: none;
    cursor: pointer;
    font-size: 30px;
    color: white;
    margin-bottom: 14px;
    transition: transform 0.1s;
  }

  #micBtn:hover {
    transform: scale(1.05);
  }

  #micBtn.recording {
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.5); }
    50% { box-shadow: 0 0 0 18px rgba(231, 76, 60, 0); }
  }

  #micLabel {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 14px;
  }

  .progress-bar {
    height: 4px;
    background: #333;
    border-radius: 4px;
    overflow: hidden;
    display: none;
    margin-bottom: 14px;
  }

  .progress-fill {
    height: 100%;
    background: #e74c3c;
    width: 0%;
    transition: width 0.1s linear;
  }

  .dur-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #888;
  }

  .dur-row input {
    flex: 1;
    accent-color: #5865f2;
  }

  .dur-row span {
    color: #5865f2;
    font-weight: bold;
    min-width: 28px;
  }

  #statusLine {
    font-size: 13px;
    color: #aaa;
    text-align: center;
    margin: 4px 0 12px;
    min-height: 18px;
  }

  #errorBox {
    background: rgba(231, 76, 60, 0.15);
    border: 1px solid rgba(231, 76, 60, 0.4);
    color: #ff8a89;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 14px;
    display: none;
    max-width: 600px;
    width: 100%;
  }

  .result-box {
    display: none;
    max-width: 600px;
    width: 100%;
  }

  .text-block {
    background: #0f3460;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
    font-size: 15px;
    line-height: 1.6;
  }

  .text-block .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #888;
    margin-bottom: 6px;
  }

  .text-block .content {
    color: #eee;
  }

  .arrow {
    text-align: center;
    font-size: 20px;
    color: #555;
    margin: 4px 0;
  }

  .conf-bar {
    height: 4px;
    background: #333;
    border-radius: 2px;
    overflow: hidden;
    margin: 4px 0;
  }

  .conf-fill {
    height: 100%;
    background: #2ecc71;
    transition: width 0.4s;
  }

  .conf-label {
    font-size: 11px;
    color: #888;
    margin-bottom: 12px;
  }

  .audio-section {
    background: #0f3460;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }

  .audio-section .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #888;
    margin-bottom: 10px;
  }

  #audioPlayer {
    width: 100%;
    margin-top: 4px;
  }

  .btn-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 10px;
  }

  .btn {
    background: #1e2a5e;
    border: 1px solid #444;
    color: #eee;
    border-radius: 8px;
    padding: 9px 16px;
    font-size: 13px;
    cursor: pointer;
  }

  .btn:hover {
    background: #2a3a7a;
  }

  .btn.primary {
    background: #5865f2;
    border-color: #5865f2;
  }

  .btn.primary:hover {
    background: #4a55e0;
  }
</style>
</head>
<body>

<h1>Speech Translator</h1>
<p class="subtitle">Speak in any language — hear it translated</p>

<div class="box">
  <h2>Languages</h2>
  <div class="lang-row">
    <select id="srcLang">
      <option value="auto">Auto-detect</option>
      <option value="en">English</option>
      <option value="hi">Hindi</option>
      <option value="fr">French</option>
      <option value="es">Spanish</option>
      <option value="de">German</option>
      <option value="zh">Chinese</option>
      <option value="ja">Japanese</option>
      <option value="ar">Arabic</option>
      <option value="pt">Portuguese</option>
      <option value="ru">Russian</option>
      <option value="ko">Korean</option>
      <option value="te">Telugu</option>
      <option value="ta">Tamil</option>
      <option value="it">Italian</option>
    </select>
    <button onclick="swapLangs()">⇄</button>
    <select id="tgtLang">
      <option value="en">English</option>
      <option value="hi" selected>Hindi</option>
      <option value="fr">French</option>
      <option value="es">Spanish</option>
      <option value="de">German</option>
      <option value="zh">Chinese</option>
      <option value="ja">Japanese</option>
      <option value="ar">Arabic</option>
      <option value="pt">Portuguese</option>
      <option value="ru">Russian</option>
      <option value="ko">Korean</option>
      <option value="te">Telugu</option>
      <option value="ta">Tamil</option>
      <option value="it">Italian</option>
    </select>
  </div>
</div>

<div class="box">
  <h2>Record</h2>
  <div class="mic-area">
    <button id="micBtn" onclick="toggleRec()">🎤</button>
    <div id="micLabel">Click the mic to start recording</div>
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="dur-row">
      <span>Max duration:</span>
      <input type="range" id="durSlider" min="3" max="15" value="5" step="1" oninput="document.getElementById('durVal').textContent = this.value + 's'">
      <span id="durVal">5s</span>
    </div>
  </div>
</div>

<div id="statusLine">Ready</div>
<div id="errorBox"></div>

<div class="result-box" id="resultBox">
  <div class="box">
    <h2>Result</h2>

    <div class="text-block">
      <div class="label" id="origLabel">Original</div>
      <div class="content" id="origText"></div>
    </div>

    <div class="conf-bar">
      <div class="conf-fill" id="confFill" style="width:0%"></div>
    </div>
    <div class="conf-label" id="confLabel"></div>

    <div class="arrow">↓</div>

    <div class="text-block">
      <div class="label" id="transLabel">Translation</div>
      <div class="content" id="transText"></div>
    </div>

    <div class="audio-section">
      <div class="label">Audio playback</div>
      <audio id="audioPlayer" controls></audio>
    </div>

    <div class="btn-row">
      <button class="btn primary" onclick="replayAudio()">▶ Play again</button>
      <button class="btn" onclick="saveText()">Save .txt</button>
      <button class="btn" onclick="copyText()">Copy text</button>
      <button class="btn" onclick="resetAll()">Record again</button>
    </div>
  </div>
</div>

<script>
var isRecording = false;
var audioCtx = null;
var recorder = null;
var timerInterval = null;
var currentAudioB64 = '';

var LANG_NAMES = {
  auto: 'Auto', en: 'English', hi: 'Hindi', fr: 'French',
  es: 'Spanish', de: 'German', zh: 'Chinese', ja: 'Japanese',
  ar: 'Arabic', pt: 'Portuguese', ru: 'Russian', ko: 'Korean',
  te: 'Telugu', ta: 'Tamil', it: 'Italian'
};

function swapLangs() {
  var s = document.getElementById('srcLang');
  var t = document.getElementById('tgtLang');
  var sv = s.value === 'auto' ? 'en' : s.value;
  var tv = t.value;
  s.value = tv;
  t.value = sv;
}

function toggleRec() {
  if (isRecording) {
    stopRec();
  } else {
    startRec();
  }
}

function startRec() {
  navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
    audioCtx = new AudioContext({ sampleRate: 16000 });
    var source = audioCtx.createMediaStreamSource(stream);
    recorder = new WavRecorder(source);
    recorder.start();

    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micLabel').textContent = 'Recording... click to stop early';
    document.getElementById('progressBar').style.display = 'block';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('errorBox').style.display = 'none';
    setStatus('Recording audio...');

    var maxMs = parseInt(document.getElementById('durSlider').value) * 1000;
    var startTime = Date.now();

    timerInterval = setInterval(function() {
      var pct = Math.min((Date.now() - startTime) / maxMs * 100, 100);
      document.getElementById('progressFill').style.width = pct + '%';
      if (pct >= 100) {
        stopRec();
      }
    }, 100);

  }).catch(function(err) {
    showError('Could not access microphone: ' + err.message);
  });
}

function stopRec() {
  clearInterval(timerInterval);
  isRecording = false;
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('micLabel').textContent = 'Processing...';
  document.getElementById('progressBar').style.display = 'none';

  var wavBlob = recorder.stop();
  sendAudio(wavBlob);
}

function sendAudio(blob) {
  setStatus('Sending to server...');

  var tgtLang = document.getElementById('tgtLang').value;
  var form = new FormData();
  form.append('audio', blob, 'recording.wav');
  form.append('target_lang', tgtLang);

  fetch('/translate', { method: 'POST', body: form })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        showError(data.error);
        setStatus('Error');
        document.getElementById('micLabel').textContent = 'Click the mic to start recording';
        return;
      }
      showResult(data);
    })
    .catch(function(err) {
      showError('Request failed: ' + err.message);
      setStatus('Error');
      document.getElementById('micLabel').textContent = 'Click the mic to start recording';
    });
}

function showResult(data) {
  document.getElementById('origLabel').textContent = 'Original — ' + (LANG_NAMES[data.src_lang] || data.src_lang);
  document.getElementById('origText').textContent = data.original_text;

  document.getElementById('transLabel').textContent = 'Translation — ' + (LANG_NAMES[data.tgt_lang] || data.tgt_lang);
  document.getElementById('transText').textContent = data.translated_text;

  var confPct = Math.round(data.confidence * 100);
  document.getElementById('confFill').style.width = confPct + '%';
  document.getElementById('confLabel').textContent = 'Language confidence: ' + confPct + '%';

  // set up audio player with the mp3 data
  currentAudioB64 = data.audio_b64;
  var audioEl = document.getElementById('audioPlayer');
  audioEl.src = 'data:audio/mp3;base64,' + data.audio_b64;
  audioEl.load();

  document.getElementById('resultBox').style.display = 'block';
  document.getElementById('micLabel').textContent = 'Click the mic to start recording';
  document.getElementById('errorBox').style.display = 'none';
  setStatus('Done!');

  // auto-play the translated audio
  audioEl.play().catch(function(e) {
    console.log('Autoplay blocked, user can click play:', e.message);
  });
}

function replayAudio() {
  var audioEl = document.getElementById('audioPlayer');
  audioEl.currentTime = 0;
  audioEl.play();
}

function saveText() {
  var orig = document.getElementById('origText').textContent;
  var trans = document.getElementById('transText').textContent;
  var content = 'Original:\n' + orig + '\n\nTranslation:\n' + trans;
  var blob = new Blob([content], { type: 'text/plain' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'translation.txt';
  a.click();
}

function copyText() {
  var orig = document.getElementById('origText').textContent;
  var trans = document.getElementById('transText').textContent;
  navigator.clipboard.writeText('Original: ' + orig + '\nTranslation: ' + trans).then(function() {
    setStatus('Copied to clipboard!');
  });
}

function resetAll() {
  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';
  setStatus('Ready');
}

function setStatus(msg) {
  document.getElementById('statusLine').textContent = msg;
}

function showError(msg) {
  var box = document.getElementById('errorBox');
  box.textContent = '⚠ ' + msg;
  box.style.display = 'block';
}

// ---- WAV Recorder ----
// Records from the mic and builds a proper WAV blob at 16kHz
function WavRecorder(source) {
  this.source = source;
  this.chunks = [];
  this.active = false;
  var self = this;

  this.processor = source.context.createScriptProcessor(4096, 1, 1);
  this.processor.onaudioprocess = function(e) {
    if (self.active) {
      self.chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
    }
  };
  source.connect(this.processor);
  this.processor.connect(source.context.destination);
}

WavRecorder.prototype.start = function() {
  this.active = true;
};

WavRecorder.prototype.stop = function() {
  this.active = false;
  this.processor.disconnect();
  this.source.disconnect();

  // merge all chunks into one array
  var totalLen = 0;
  for (var i = 0; i < this.chunks.length; i++) {
    totalLen += this.chunks[i].length;
  }
  var merged = new Float32Array(totalLen);
  var pos = 0;
  for (var i = 0; i < this.chunks.length; i++) {
    merged.set(this.chunks[i], pos);
    pos += this.chunks[i].length;
  }

  return buildWav(merged, 16000);
};

function buildWav(samples, sampleRate) {
  var numSamples = samples.length;
  var buf = new ArrayBuffer(44 + numSamples * 2);
  var view = new DataView(buf);

  function writeStr(offset, str) {
    for (var i = 0; i < str.length; i++) {
      view.setUint8(offset + i, str.charCodeAt(i));
    }
  }

  writeStr(0, 'RIFF');
  view.setUint32(4, 36 + numSamples * 2, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);  // PCM
  view.setUint16(22, 1, true);  // mono
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeStr(36, 'data');
  view.setUint32(40, numSamples * 2, true);

  var offset = 44;
  for (var i = 0; i < numSamples; i++) {
    var s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    offset += 2;
  }

  return new Blob([buf], { type: 'audio/wav' });
}
</script>
</body>
</html>
